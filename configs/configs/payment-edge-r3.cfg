!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname payment-edge-r3
!
boot-start-marker
boot-end-marker
!
no aaa new-model
no ip domain-lookup
ip cef
!
! ===== Smart-city role: DIGITAL PAYMENT EDGE ROUTER =====
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface GigabitEthernet0/0
 description LINK-TO-traffic-core-r1
 ip address 10.1.13.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description LINK-TO-surveillance-dist-r2
 ip address 10.1.23.3 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description PAYMENT-TERMINAL-LAN
 ip address 192.168.30.1 255.255.255.0
 ip access-group PAYMENT-PROTECT in
 no shutdown
!
interface GigabitEthernet0/3
 description INTERNET-UPLINK-UNTRUSTED
 ip address 203.0.113.2 255.255.255.252
 ip access-group MISSING-ACL in
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.13.0 0.0.0.255 area 0
 network 10.1.23.0 0.0.0.255 area 1
 network 192.168.30.0 0.0.0.255 area 0
!
router bgp 65001
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 update-source Loopback0
 !
 address-family ipv4
  network 192.168.30.0 mask 255.255.255.0
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.2 activate
 exit-address-family
!
ip access-list extended PAYMENT-PROTECT
 permit tcp 192.168.30.0 0.0.0.255 any eq 443
 permit tcp 192.168.30.0 0.0.0.255 any eq 8443
 permit udp 192.168.30.0 0.0.0.255 any eq domain
 deny   ip any any log
!
line con 0
line vty 0 4
 login local
 transport input ssh
!
end
