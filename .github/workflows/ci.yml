name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      # Point all writable paths at the runner temp dir so module import
      # (which mkdir's these) works without root, and use a clean config dir.
      UPLOAD_DIR: ${{ runner.temp }}/uploads
      DATA_DIR: ${{ runner.temp }}/data
      TOPO_DIR: ${{ runner.temp }}/topologies
      LOCAL_CONFIG_DIR: ${{ github.workspace }}/configs
      MPLBACKEND: Agg
      MPLCONFIGDIR: ${{ runner.temp }}/mpl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/app/requirements.txt
          pip install -r tests/requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/test_unit.py -q
