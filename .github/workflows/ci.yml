name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      # Point all writable paths under the workspace so module import (which
      # mkdir's these) works without root. (Only the `github` context is allowed
      # in job-level env.)
      UPLOAD_DIR: ${{ github.workspace }}/_run/uploads
      DATA_DIR: ${{ github.workspace }}/_run/data
      TOPO_DIR: ${{ github.workspace }}/_run/topologies
      LOCAL_CONFIG_DIR: ${{ github.workspace }}/configs
      MPLBACKEND: Agg
      MPLCONFIGDIR: ${{ github.workspace }}/_run/mpl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/app/requirements.txt
          pip install -r tests/requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/test_unit.py -q
